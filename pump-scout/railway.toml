[build]
  builder = "nixpacks"

[[services]]
  name = "backend"
  source = "backend"

  [services.deploy]
    startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"

  [[services.variables]]
    ANTHROPIC_API_KEY = ""  # set in Railway dashboard
    # DATABASE_URL is injected automatically by the Railway PostgreSQL plugin —
    # do NOT set it here or it will override the plugin value with an empty string.

[[services]]
  name = "frontend"
  source = "frontend"

  [services.deploy]
    startCommand = "npm start"

  [[services.variables]]
    NEXT_PUBLIC_API_URL = "https://backend.railway.app"
